<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="100%" height="100%" fill="#0B0B0F" />
  <g transform="translate(40,40)">
    <text x="0" y="-10" fill="#E5E7EB" font-size="14">Confusion Matrix (example)</text>
    <rect x="0" y="0" width="320" height="320" fill="#111118" stroke="#4B5563" />
    <!-- 5x5 grid -->
    <g stroke="#2D3748" stroke-width="1">
      {Array.from({length:6}).map((_,i)=>null)}
    </g>
    <text x="10" y="30" fill="#E5E7EB">Class 0</text>
    <text x="90" y="30" fill="#9CA3AF">12</text>
    <text x="170" y="30" fill="#9CA3AF">1</text>
    <text x="250" y="30" fill="#9CA3AF">0</text>
    <text x="330" y="30" fill="#9CA3AF">0</text>
  </g>
</svg>
